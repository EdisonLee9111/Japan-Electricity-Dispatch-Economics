# ==============================================================================
# Japan Electricity Dispatch Economics - Unified Technical & Economic Assumptions
# ==============================================================================
# 说明：
# 本文件定义日本电力系统按燃料类型聚合（fleet-level）的技术与经济假设。
# 已将原先重复的 `generators` 顶层结构合并为单一有效 YAML 映射，
# 便于后续由 `process_raw.py` 统一读取并生成 `fleet.csv`。
#
# 主要参考来源（沿用原始说明）：
# - NREL ATB 2024
# - IEA World Energy Outlook 2025
# - Lazard LCOE v16.0
# - OCCTO / METI 日本装机容量参考
# ==============================================================================

generators:
  nuclear:
    installed_capacity_mw: 10000.0
    forced_outage_rate: 0.03         # nuclear FOH relatively low when running
    planned_outage_rate: 0.12        # ~6 weeks planned outage, concentrated in shoulder
    min_stable_generation_pct: 0.50
    heat_rate_mmbtu_per_mwh: 10.46
    variable_om_usd_per_mwh: 3.00
    startup_cost_cold_usd_per_mw: 50.0
    startup_cost_warm_usd_per_mw: 50.0
    startup_cost_hot_usd_per_mw: 50.0
    min_up_time_hours: 168
    min_down_time_hours: 48
    ramp_rate_pct_per_hour: 0.05
    must_run: true
    capital_cost_usd_per_kw: 4700.0
    fixed_om_usd_per_kw_yr: 120.0
    fuel_cost_usd_per_mmbtu: 0.70

  # ── Coal split: USC (new, efficient) vs subcritical (old, inefficient) ──
  coal_usc:
    installed_capacity_mw: 24000.0   # ~53% of 45 GW fleet (USC + SC modern)
    forced_outage_rate: 0.05         # random forced outage, uniform year-round
    planned_outage_rate: 0.17        # ~4-5 weeks planned, concentrated in shoulder months
    min_stable_generation_pct: 0.40
    heat_rate_mmbtu_per_mwh: 8.30    # USC/A-USC best-in-class
    variable_om_usd_per_mwh: 4.00
    startup_cost_cold_usd_per_mw: 100.0
    startup_cost_warm_usd_per_mw: 70.0
    startup_cost_hot_usd_per_mw: 40.0
    min_up_time_hours: 24
    min_down_time_hours: 8
    ramp_rate_pct_per_hour: 0.25
    must_run: false
    capital_cost_usd_per_kw: 2100.0
    fixed_om_usd_per_kw_yr: 40.0
    fuel_cost_usd_per_mmbtu: 5.80

  coal_old:
    installed_capacity_mw: 21000.0   # ~47% of 45 GW fleet (subcritical + old SC)
    forced_outage_rate: 0.08         # older units: higher random failure rate
    planned_outage_rate: 0.20        # 5-6 weeks planned, concentrated in shoulder months
    min_stable_generation_pct: 0.45
    heat_rate_mmbtu_per_mwh: 10.50   # subcritical, significantly less efficient
    variable_om_usd_per_mwh: 5.50    # higher maintenance costs
    startup_cost_cold_usd_per_mw: 120.0
    startup_cost_warm_usd_per_mw: 85.0
    startup_cost_hot_usd_per_mw: 50.0
    min_up_time_hours: 24
    min_down_time_hours: 12
    ramp_rate_pct_per_hour: 0.20
    must_run: false
    capital_cost_usd_per_kw: 2100.0
    fixed_om_usd_per_kw_yr: 55.0
    fuel_cost_usd_per_mmbtu: 5.80

  lng_ccgt:
    installed_capacity_mw: 65000.0
    forced_outage_rate: 0.04         # CCGT random forced outage
    planned_outage_rate: 0.08        # ~3-4 weeks planned, shoulder months
    min_stable_generation_pct: 0.30
    heat_rate_mmbtu_per_mwh: 6.60
    variable_om_usd_per_mwh: 2.50
    startup_cost_cold_usd_per_mw: 60.0
    startup_cost_warm_usd_per_mw: 40.0
    startup_cost_hot_usd_per_mw: 25.0
    min_up_time_hours: 4
    min_down_time_hours: 2
    ramp_rate_pct_per_hour: 0.60
    must_run: false
    must_run_mw: 8000.0              # ③ take-or-pay LNG contract floor (~12% of capacity)
    capital_cost_usd_per_kw: 1100.0
    fixed_om_usd_per_kw_yr: 15.0
    fuel_cost_usd_per_mmbtu: 12.00

  lng_ocgt:
    installed_capacity_mw: 15000.0
    forced_outage_rate: 0.03         # peakers: kept ready, low forced outage
    planned_outage_rate: 0.07        # short planned outage, shoulder months
    min_stable_generation_pct: 0.20
    heat_rate_mmbtu_per_mwh: 9.80
    variable_om_usd_per_mwh: 4.50
    startup_cost_cold_usd_per_mw: 30.0
    startup_cost_warm_usd_per_mw: 20.0
    startup_cost_hot_usd_per_mw: 10.0
    min_up_time_hours: 1
    min_down_time_hours: 1
    ramp_rate_pct_per_hour: 1.00
    must_run: false
    capital_cost_usd_per_kw: 750.0
    fixed_om_usd_per_kw_yr: 10.0
    fuel_cost_usd_per_mmbtu: 12.00

  oil:
    installed_capacity_mw: 15000.0
    forced_outage_rate: 0.06         # aging oil fleet, moderate forced outage
    planned_outage_rate: 0.14        # longer planned outage, shoulder months
    min_stable_generation_pct: 0.20
    heat_rate_mmbtu_per_mwh: 11.00
    variable_om_usd_per_mwh: 6.00
    startup_cost_cold_usd_per_mw: 80.0
    startup_cost_warm_usd_per_mw: 60.0
    startup_cost_hot_usd_per_mw: 40.0
    min_up_time_hours: 4
    min_down_time_hours: 4
    ramp_rate_pct_per_hour: 0.40
    must_run: false
    capital_cost_usd_per_kw: 900.0
    fixed_om_usd_per_kw_yr: 20.0
    fuel_cost_usd_per_mmbtu: 18.00

  hydro:
    installed_capacity_mw: 10000.0   # run-of-river baseload portion; remaining ~12 GW is dispatchable reservoir
    forced_outage_rate: 0.02
    planned_outage_rate: 0.03        # minimal planned outage for run-of-river
    min_stable_generation_pct: 0.0
    heat_rate_mmbtu_per_mwh: 0.0
    variable_om_usd_per_mwh: 0.0
    startup_cost_cold_usd_per_mw: 0.0
    startup_cost_warm_usd_per_mw: 0.0
    startup_cost_hot_usd_per_mw: 0.0
    min_up_time_hours: 0
    min_down_time_hours: 0
    ramp_rate_pct_per_hour: 1.00
    must_run: false
    capital_cost_usd_per_kw: 3000.0
    fixed_om_usd_per_kw_yr: 45.0
    fuel_cost_usd_per_mmbtu: 0.0

  solar:
    installed_capacity_mw: 80000.0
    forced_outage_rate: 0.0
    planned_outage_rate: 0.0         # intermittency handled by CF profile, not outage rate
    min_stable_generation_pct: 0.0
    heat_rate_mmbtu_per_mwh: 0.0
    variable_om_usd_per_mwh: 0.0
    startup_cost_cold_usd_per_mw: 0.0
    startup_cost_warm_usd_per_mw: 0.0
    startup_cost_hot_usd_per_mw: 0.0
    min_up_time_hours: 0
    min_down_time_hours: 0
    ramp_rate_pct_per_hour: 1.00
    must_run: true
    capital_cost_usd_per_kw: 660.0
    fixed_om_usd_per_kw_yr: 12.0
    fuel_cost_usd_per_mmbtu: 0.0

  wind:
    installed_capacity_mw: 5000.0
    forced_outage_rate: 0.0
    planned_outage_rate: 0.0
    min_stable_generation_pct: 0.0
    heat_rate_mmbtu_per_mwh: 0.0
    variable_om_usd_per_mwh: 0.0
    startup_cost_cold_usd_per_mw: 0.0
    startup_cost_warm_usd_per_mw: 0.0
    startup_cost_hot_usd_per_mw: 0.0
    min_up_time_hours: 0
    min_down_time_hours: 0
    ramp_rate_pct_per_hour: 1.00
    must_run: true
    capital_cost_usd_per_kw: 1450.0
    fixed_om_usd_per_kw_yr: 40.0
    fuel_cost_usd_per_mmbtu: 0.0

  biomass:
    installed_capacity_mw: 5000.0
    forced_outage_rate: 0.05
    planned_outage_rate: 0.10        # ~3-4 weeks planned, shoulder months
    min_stable_generation_pct: 0.30
    heat_rate_mmbtu_per_mwh: 12.00
    variable_om_usd_per_mwh: 5.00
    startup_cost_cold_usd_per_mw: 80.0
    startup_cost_warm_usd_per_mw: 50.0
    startup_cost_hot_usd_per_mw: 30.0
    min_up_time_hours: 12
    min_down_time_hours: 6
    ramp_rate_pct_per_hour: 0.20
    must_run: false
    capital_cost_usd_per_kw: 3200.0
    fixed_om_usd_per_kw_yr: 100.0
    fuel_cost_usd_per_mmbtu: 6.00

global_assumptions:
  carbon_price_jpy_per_ton: 3000.0   # GX-ETS FY2026 mid-range (floor 1,700 / cap 4,300)
  currency_exchange_rate_jpy_usd: 150.0
  # Months when planned outages are concentrated (spring/autumn shoulder)
  shoulder_months: [4, 5, 10, 11]

# CO2 emission factors (tCO2/MWh, combustion only)
# Sources: IPCC 2006 Guidelines, Japan MOE emission coefficients
emission_factors_tco2_per_mwh:
  nuclear: 0.0
  coal_usc: 0.85     # more efficient combustion → slightly lower per-MWh emissions
  coal_old: 1.05     # subcritical → higher per-MWh emissions
  lng_ccgt: 0.37
  lng_ocgt: 0.55
  oil: 0.65
  hydro: 0.0
  solar: 0.0
  wind: 0.0
  biomass: 0.0       # biogenic CO2, net-zero under GX-ETS
